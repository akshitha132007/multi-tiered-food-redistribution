<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trust Score</title>

<link rel="stylesheet" href="css/style.css">
<script defer src="js/script.js"></script>

</head>

<body>

<div class="mobile">

<h2>Trust Score</h2>

<div class="card">

<!-- ⭐ STAR RATING -->
<div class="trust-top">
  <div class="big-stars">⭐ ⭐ ⭐ ⭐ ☆</div>
  <p class="rating-text">4.0 / 5 Rating</p>
</div>

<!-- 📝 REVIEWS -->
<h4>Reviews</h4>

<div class="review-box">
  Food was delivered on time and in good condition.
</div>

<div class="review-box">
  Very reliable donor, helped many people.
</div>

<div class="review-box">
  Packaging and hygiene was excellent.
</div>

<!-- 🏅 GOVT BADGE -->
<h4>Verification</h4>

<div class="badge">
  🏅 Government Verified
</div>

</div>

</div>

</body>
</html>
