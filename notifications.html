<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notifications</title>

<link rel="stylesheet" href="css/style.css">
<script defer src="js/script.js"></script>

</head>

<body>

<div class="mobile">

<h2>Notifications</h2>

<div class="card">

<!-- 🆘 PEOPLE IN NEED -->
<h4>People in Need</h4>

<div class="notif-box">
  🧑‍🤝‍🧑 Orphanage needs food urgently
</div>

<div class="notif-box">
  🐾 Animal shelter request nearby
</div>

<!-- 📦 DONATION STATUS -->
<h4>Donation Status</h4>

<div class="notif-box">
  ✅ Your donation has been accepted
</div>

<div class="notif-box">
  🚚 Pickup scheduled
</div>

<!-- ⏰ TIMER ALERTS -->
<h4>Timer Alerts</h4>

<div class="notif-box warning">
  ⚠️ 1 hour left before expiry
</div>

<div class="notif-box danger">
  ⛔ 30 mins left! Act fast
</div>

</div>

</div>

</body>
</html>
