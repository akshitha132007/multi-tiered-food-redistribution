<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Receiver History</title>

<link rel="stylesheet" href="css/style.css">
<script defer src="js/script.js"></script>

</head>

<body>

<div class="mobile">

<h2>Received Donations</h2>

<div class="card">

<!-- ITEM 1 -->
<div class="donation-item">
  <p><b>Food:</b> Rice & Curry</p>
  <p><b>Donor:</b> ABC Hotel</p>
  <p><b>Date:</b> 22 Mar 2026</p>
  <p class="status success">Received</p>
</div>

<!-- ITEM 2 -->
<div class="donation-item">
  <p><b>Food:</b> Bakery Items</p>
  <p><b>Donor:</b> XYZ Bakery</p>
  <p><b>Date:</b> 20 Mar 2026</p>
  <p class="status pending">On the way</p>
</div>

<!-- ITEM 3 -->
<div class="donation-item">
  <p><b>Food:</b> Vegetables</p>
  <p><b>Donor:</b> Fresh Mart</p>
  <p><b>Date:</b> 18 Mar 2026</p>
  <p class="status failed">Expired</p>
</div>

</div>

<!-- ⬇️ BOTTOM NAV -->
<div class="bottom-nav two-nav">

  <button class="active" onclick="goToHistory()">
    📜
    <span>History</span>
  </button>

  <button onclick="goToReceiverDashboard()">
    ✋
    <span>Raise Hand</span>
  </button>

</div>

</div>

</body>
</html>
