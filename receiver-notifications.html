<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Receiver Notifications</title>

<link rel="stylesheet" href="css/style.css">
<script defer src="js/script.js"></script>

</head>

<body>

<div class="mobile">

<h2>Notifications</h2>

<div class="card">

<!-- 🍱 AVAILABLE DONATIONS -->
<h4>Available Donations</h4>

<div class="notif-box">
  🍛 New food available from ABC Hotel nearby
</div>

<div class="notif-box">
  🥗 Fresh food available from XYZ Restaurant
</div>

<!-- ✅ ACCEPTED STATUS -->
<h4>Accepted Status</h4>

<div class="notif-box">
  👍 Your request has been accepted
</div>

<div class="notif-box">
  🚚 Pickup is on the way
</div>

<!-- ⏰ TIMER ALERTS -->
<h4>Expiry Alerts</h4>

<div class="notif-box warning">
  ⚠️ 1 hour left before food expires
</div>

<div class="notif-box danger">
  ⛔ 30 minutes left! Hurry up
</div>

</div>

</div>

</body>
</html>
