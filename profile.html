<!DOCTYPE html>
<html>

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile</title>

  <link rel="stylesheet" href="css/style.css">
  <script defer src="js/script.js"></script>
</head>

<body>

<div class="mobile">

  <h2>Profile</h2>

  <div class="card profile-card">

    <!-- PROFILE TOP -->
    <div class="profile-top">
      <div class="profile-pic">👤</div>
      <div>
        <h3>ABC Organization</h3>
        <p class="sub-text">Hotel / Restaurant</p>
      </div>
    </div>

    <!-- DETAILS -->
    <h4>Details</h4>
    <p class="info-text">Established: 2015</p>
    <p class="info-text">Location: Hyderabad</p>
    <p class="info-text">Contact: 9876543210</p>

    <!-- REVIEWS -->
    <h4>Reviews</h4>
    <div class="review-box">Great service and timely donations</div>
    <div class="review-box">Food quality was good</div>

    <!-- TRUST SCORE -->
    <h4>Trust Score</h4>
    <div class="stars">⭐ ⭐ ⭐ ⭐ ☆</div>

  </div>

</div>

</body>
</html>
